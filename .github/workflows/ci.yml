name: Autograding Tests
"on":
  - push
  - workflow_dispatch
permissions:
  checks: write
  actions: read
  contents: read
jobs:
  run-autograding-tests:
    env:
      CI: true
      E2E: true
      DATABASE_URL: file:./dev.db
      PASSWORD: 123
      JWT_SECRET: secret
      SKIP_ENV_VALIDATION: true
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      COURSE_ID: full-stack-development-comp3036-2026
    runs-on: ubuntu-latest
    if: github.actor != 'github-classroom[bot]'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 10.2.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Install Playwright Browsers
        working-directory: tests/playwright
        run: pnpm playwright install chromium --with-deps

      - name: Push Database
        run: pnpm --filter @repo/db db:push

      - name: Build the project
        run: pnpm turbo build

      ####################
      # UNIT TESTS
      ####################

      - name: Test - Utils
        id: testUtils
        uses: WesternSydneyUniversity/autograding-command-grader@v2
        continue-on-error: true
        with:
          working-directory: packages/utils
          test-name: Unit 1 - Utils
          command: pnpm test
          timeout: 10
          max-score: 1

      - name: Test - Ui
        id: testUi
        uses: WesternSydneyUniversity/autograding-command-grader@v2
        continue-on-error: true
        with:
          working-directory: packages/ui
          test-name: Unit 2 - UI
          command: pnpm test
          timeout: 10
          max-score: 1

      - name: Test - Web
        id: testWeb
        uses: WesternSydneyUniversity/autograding-command-grader@v2
        continue-on-error: true
        with:
          working-directory: apps/web
          test-name: Unit 3 - Web Components
          command: pnpm test
          timeout: 10
          max-score: 1

      ####################
      # START SERVERS
      ####################

      - name: Start web server
        run: pnpm --filter web start -p 3001 &

      - name: Start admin server
        run: pnpm --filter admin start -p 3002 &

      - name: Wait for servers
        run: npx wait-on http://localhost:3001 http://localhost:3002 --timeout 60000

      ####################
      #TEST 1
      ####################

      - name: Test Assignment 1 with Playwright
        id: npm1
        uses: WesternSydneyUniversity/autograding-command-grader@v2
        continue-on-error: true
        with:
          working-directory: .
          test-name: Part 1 - Client
          command: pnpm turbo test-1
          timeout: 10
          max-score: 1

      - name: Report Assignment 1 to SkillPies
        if: always()
        continue-on-error: true
        uses: tomitrescak/skillpies-reporting@v1.0
        with:
          courseId: ${{ env.COURSE_ID }}
          sectionId: assignment-2-1-blog-client-in-next-js
          testResult: ${{ steps.npm1.outputs.result }}

      ####################
      # TEST 2
      ####################

      - name: Test Assignment 2 with Playwright
        id: npm2
        uses: WesternSydneyUniversity/autograding-command-grader@v2
        continue-on-error: true
        with:
          working-directory: .
          test-name: Part 2 - Admin
          command: pnpm turbo test-2
          timeout: 10
          max-score: 1

      - name: Report Assignment 2 to SkillPies
        if: always()
        continue-on-error: true
        uses: tomitrescak/skillpies-reporting@v1.0
        with:
          courseId: ${{ env.COURSE_ID }}
          sectionId: assignment-2-2-blog-admin-in-databases
          testResult: ${{ steps.npm2.outputs.result }}

      ####################
      # TEST 3
      ####################

      - name: Test Assignment 3 with Playwright
        id: npm3
        uses: WesternSydneyUniversity/autograding-command-grader@v2
        continue-on-error: true
        with:
          working-directory: .
          test-name: Part 3 - Backend
          command: pnpm turbo test-3
          timeout: 10
          max-score: 1

      - name: Report Assignment 3 to SkillPies
        if: always()
        continue-on-error: true
        uses: tomitrescak/skillpies-reporting@v1.0
        with:
          courseId: ${{ env.COURSE_ID }}
          sectionId: assignment-2-3-blog-backend-in-authentication-and-authorisation
          testResult: ${{ steps.npm3.outputs.result }}

      ####################
      # TEST 4
      ####################

      - name: Test Assignment 4 with Playwright
        id: npm4
        uses: WesternSydneyUniversity/autograding-command-grader@v2
        continue-on-error: true
        with:
          working-directory: .
          test-name: Part 4 - Pagination
          command: pnpm turbo test-4
          timeout: 10
          max-score: 1

      - name: Report Assignment 4 to SkillPies
        if: always()
        continue-on-error: true
        uses: tomitrescak/skillpies-reporting@v1.0
        with:
          courseId: ${{ env.COURSE_ID }}
          sectionId: assignment-2-4-blog-pagination
          testResult: ${{ steps.npm4.outputs.result }}

      ####################
      # TEST 5
      ####################

      - name: Test Assignment 5 with Playwright
        id: npm5
        uses: WesternSydneyUniversity/autograding-command-grader@v2
        continue-on-error: true
        with:
          working-directory: .
          test-name: Part 5 - Comments
          command: pnpm turbo test-5
          timeout: 10
          max-score: 1

      - name: Report Assignment 5 to SkillPies
        if: always()
        continue-on-error: true
        uses: tomitrescak/skillpies-reporting@v1.0
        with:
          courseId: ${{ env.COURSE_ID }}
          sectionId: assignment-2-5-blog-comments
          testResult: ${{ steps.npm5.outputs.result }}

      ####################
      # AUTOGRADING REPORTER
      ####################

      - name: Autograding Reporter
        uses: education/autograding-grading-reporter@v1
        env:
          NPM1_RESULTS: "${{ steps.npm1.outputs.result }}"
          NPM2_RESULTS: "${{ steps.npm2.outputs.result }}"
          NPM3_RESULTS: "${{ steps.npm3.outputs.result }}"
          NPM4_RESULTS: "${{ steps.npm4.outputs.result }}"
          NPM5_RESULTS: "${{ steps.npm5.outputs.result }}"
          TESTUTILS_RESULTS: "${{ steps.testUtils.outputs.result }}"
          TESTUI_RESULTS: "${{ steps.testUi.outputs.result }}"
          TESTWEB_RESULTS: "${{ steps.testWeb.outputs.result }}"
        with:
          runners: npm1,npm2,npm3,npm4,npm5,testUtils,testUi,testWeb