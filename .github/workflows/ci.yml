name: Blog CI

on:
  push:
  pull_request:

env:
  CI: true
  E2E: true
  DATABASE_URL: file:./dev.db
  PASSWORD: 123
  JWT_SECRET: secret
  SKIP_ENV_VALIDATION: true
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  COURSE_ID: full-stack-development-comp3036-2026

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:

      # Setup 
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 10.2.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Install Playwright browsers
        working-directory: tests/playwright
        run: pnpm playwright install chromium --with-deps

      #  Build 
      - name: Sync database schema
        run: pnpm --filter @repo/db db:push

      - name: Build
        run: pnpm turbo build

      - name: Type check
        run: pnpm turbo check-types

      - name: Lint
        run: pnpm turbo lint

      # Unit Tests 
      - name: Unit tests - utils
        id: testUtils
        uses: WesternSydneyUniversity/autograding-command-grader@v2
        continue-on-error: true
        with:
          working-directory: packages/utils
          test-name: Utils
          command: pnpm test
          timeout: 10
          max-score: 1

      - name: Unit tests - ui
        id: testUi
        uses: WesternSydneyUniversity/autograding-command-grader@v2
        continue-on-error: true
        with:
          working-directory: packages/ui
          test-name: UI Components
          command: pnpm test
          timeout: 10
          max-score: 1

      - name: Unit tests - web
        id: testWeb
        uses: WesternSydneyUniversity/autograding-command-grader@v2
        continue-on-error: true
        with:
          working-directory: apps/web
          test-name: Web Components
          command: pnpm test
          timeout: 10
          max-score: 1

      # Start servers for E2E tests
      - name: Start web server
        run: pnpm --filter web start -p 3001 &

      - name: Start admin server
        run: pnpm --filter admin start -p 3002 &

      - name: Wait for servers
        run: |
          npx wait-on http://localhost:3001 http://localhost:3002 --timeout 60000

      # E2E: Blog pages 
      - name: E2E - Blog pages
        id: npm1
        uses: WesternSydneyUniversity/autograding-command-grader@v2
        continue-on-error: true
        with:
          working-directory: .
          test-name: Blog Pages
          command: pnpm turbo test-1
          timeout: 10
          max-score: 1

      - name: Report blog pages
        if: always()
        continue-on-error: true
        uses: tomitrescak/skillpies-reporting@v1.0
        with:
          courseId: ${{ env.COURSE_ID }}
          sectionId: assignment-2-1-blog-client-in-next-js
          testResult: ${{ steps.npm1.outputs.result }}

      # E2E: Admin panel 
      - name: E2E - Admin panel
        id: npm2
        uses: WesternSydneyUniversity/autograding-command-grader@v2
        continue-on-error: true
        with:
          working-directory: .
          test-name: Admin Panel
          command: pnpm turbo test-2
          timeout: 10
          max-score: 1

      - name: Report admin panel
        if: always()
        continue-on-error: true
        uses: tomitrescak/skillpies-reporting@v1.0
        with:
          courseId: ${{ env.COURSE_ID }}
          sectionId: assignment-2-2-blog-admin-in-databases
          testResult: ${{ steps.npm2.outputs.result }}

      # E2E: API and Auth 
      - name: E2E - API and auth
        id: npm3
        uses: WesternSydneyUniversity/autograding-command-grader@v2
        continue-on-error: true
        with:
          working-directory: .
          test-name: API and Auth
          command: pnpm turbo test-3
          timeout: 10
          max-score: 1

      - name: Report API and auth
        if: always()
        continue-on-error: true
        uses: tomitrescak/skillpies-reporting@v1.0
        with:
          courseId: ${{ env.COURSE_ID }}
          sectionId: assignment-2-3-blog-backend-in-authentication-and-authorisation
          testResult: ${{ steps.npm3.outputs.result }}

      # E2E: Pagination 
      - name: E2E - Pagination
        id: npm4
        uses: WesternSydneyUniversity/autograding-command-grader@v2
        continue-on-error: true
        with:
          working-directory: .
          test-name: Pagination
          command: pnpm turbo test-4
          timeout: 10
          max-score: 1

      - name: Report pagination
        if: always()
        continue-on-error: true
        uses: tomitrescak/skillpies-reporting@v1.0
        with:
          courseId: ${{ env.COURSE_ID }}
          sectionId: assignment-2-4-blog-pagination
          testResult: ${{ steps.npm4.outputs.result }}

      # E2E: Comments 
      - name: E2E - Comments
        id: npm5
        uses: WesternSydneyUniversity/autograding-command-grader@v2
        continue-on-error: true
        with:
          working-directory: .
          test-name: Comments
          command: pnpm turbo test-5
          timeout: 10
          max-score: 1

      - name: Report comments
        if: always()
        continue-on-error: true
        uses: tomitrescak/skillpies-reporting@v1.0
        with:
          courseId: ${{ env.COURSE_ID }}
          sectionId: assignment-2-5-blog-comments
          testResult: ${{ steps.npm5.outputs.result }}

      # Autograding Reporter 
      - name: Autograding Reporter
        uses: education/autograding-grading-reporter@v1
        env:
          NPM1_RESULTS: "${{ steps.npm1.outputs.result }}"
          NPM2_RESULTS: "${{ steps.npm2.outputs.result }}"
          NPM3_RESULTS: "${{ steps.npm3.outputs.result }}"
          NPM4_RESULTS: "${{ steps.npm4.outputs.result }}"
          NPM5_RESULTS: "${{ steps.npm5.outputs.result }}"
          TESTUTILS_RESULTS: "${{ steps.testUtils.outputs.result }}"
          TESTUI_RESULTS: "${{ steps.testUi.outputs.result }}"
          TESTWEB_RESULTS: "${{ steps.testWeb.outputs.result }}"
        with:
          runners: npm1,npm2,npm3,npm4,npm5,testUtils,testUi,testWeb

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 10.2.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Push DB schema to Turso
        run: pnpm --filter @repo/db db:push:turso
        env:
          DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          SKIP_ENV_VALIDATION: true

      # Deploy web app
      - name: Deploy web to Vercel
        working-directory: .
        run: |
          npx vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }} --scope=${{ secrets.VERCEL_ORG_ID }}
          npx vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
          npx vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_WEB_PROJECT_ID }}

      # Deploy admin app
      - name: Deploy admin to Vercel
        working-directory: .
        run: |
          npx vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }} --scope=${{ secrets.VERCEL_ORG_ID }}
          npx vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
          npx vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_ADMIN_PROJECT_ID }}